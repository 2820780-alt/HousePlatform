<style>
  :root {
    --atom-bg: #050917;
    --atom-surface: rgba(12, 22, 52, 0.82);
    --atom-surface-2: rgba(16, 31, 75, 0.74);
    --atom-line: rgba(119, 172, 255, 0.22);
    --atom-line-strong: rgba(24, 215, 242, 0.44);
    --atom-text: #eef7ff;
    --atom-muted: #8fa4c8;
    --atom-cyan: #18d7f2;
    --atom-blue: #3b82f6;
    --atom-green: #22c55e;
    --atom-amber: #f59e0b;
    --atom-red: #ff3b7f;
    --atom-violet: #a855f7;
    --atom-radius: 8px;
    --atom-shadow: 0 22px 64px rgba(0, 0, 0, 0.38);

  [data-atom-page] {

    background:

      radial-gradient(circle at 86% 6%, rgba(168, 85, 247, 0.12), transparent 30%),
      linear-gradient(135deg, var(--atom-bg), #0b1535 58%, #130d2b);
  }
  [data-rbac-ready] [data-module-number],
  [data-rbac-ready] [data-widget-key],
  [data-rbac-ready] [data-permission-key] {
    position: relative;
  }
  .rbac-chip {
    display: inline-flex;
    align-items: center;
    min-height: 22px;
    padding: 2px 7px;
    border: 1px solid rgba(24, 215, 242, 0.28);
    border-radius: 999px;
    background: rgba(24, 215, 242, 0.08);
    color: #bff7ff;
    font-size: 11px;
    white-space: nowrap;
  }

  .atom-panel,
  .atom-module-card {
    border: 1px solid var(--atom-line);
    border-radius: var(--atom-radius);

    box-shadow: var(--atom-shadow);
  }

  .table-scroll {

    top: 0;

    background: #111942;
  }
  section {
    overflow: visible !important;
  }
  .atom-empty {
    padding: 18px;
    border: 1px dashed rgba(119, 172, 255, 0.28);
    border-radius: var(--atom-radius);
    color: var(--atom-muted);
    background: rgba(7, 13, 33, 0.34);
