<style>
  .atom-platform-topbar {
    position: sticky;
    top: 0;
    z-index: 120;
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 58px;
    padding: 9px 18px;
    border-bottom: 1px solid rgba(119, 172, 255, 0.22);
    background: rgba(5, 9, 23, 0.86);
    backdrop-filter: blur(18px);
  }
  .atom-platform-topbar + header { top: 58px; }
  .atom-platform-brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
    color: #eef7ff;
    text-decoration: none;
  }
  .atom-platform-logo {
    position: relative;
    display: grid;
    place-items: center;
    width: 38px;
    height: 38px;
    flex: 0 0 38px;
    border: 1px solid rgba(24, 215, 242, 0.62);
    border-radius: 50%;
    color: #18d7f2;
    font-weight: 900;
    background: radial-gradient(circle, rgba(24, 215, 242, 0.38), rgba(5, 9, 23, 0.8) 52%);
    box-shadow: 0 0 24px rgba(24, 215, 242, 0.26);
  }
  .atom-platform-logo::before,
  .atom-platform-logo::after {
    content: "";
    position: absolute;
    inset: 8px -5px;
    border: 1px solid rgba(24, 215, 242, 0.44);
    border-radius: 50%;
    transform: rotate(34deg);
  }
  .atom-platform-logo::after { transform: rotate(-34deg); }
  .atom-platform-brand strong {
    display: block;
    line-height: 1.05;
    letter-spacing: 0;
  }
  .atom-platform-brand small {
    color: #8fa4c8;
    line-height: 1.05;
  }
  .atom-platform-chip,
  .atom-platform-icon,
  .atom-platform-profile {
    min-height: 38px;
    border: 1px solid rgba(119, 172, 255, 0.22);
    border-radius: 10px;
    background: rgba(7, 14, 35, 0.64);
    color: #8fa4c8;
  }
  .atom-platform-chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    min-width: 0;
    padding: 0 10px;
    white-space: nowrap;
  }
  .atom-platform-chip strong {
    color: #eef7ff;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .atom-platform-chip.region {
    border-color: rgba(24, 215, 242, 0.3);
    border-radius: 999px;
    background: rgba(24, 215, 242, 0.08);
  }
  .atom-platform-chip.region::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #18d7f2;
    box-shadow: 0 0 12px rgba(24, 215, 242, 0.82);
  }
  .atom-platform-spacer {
    flex: 1 1 auto;
    min-width: 10px;
  }
  .atom-platform-icon {
    display: grid;
    place-items: center;
    width: 38px;
    flex: 0 0 38px;
    text-decoration: none;
    cursor: pointer;
  }
  .atom-platform-profile {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 999px;
    color: #eef7ff;
    text-decoration: none;
    white-space: nowrap;
  }
  .atom-platform-avatar {
    display: grid;
    place-items: center;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, #18d7f2, #3b82f6);
    color: #061026;
    font-weight: 800;
  }
  @media (max-width: 920px) {
    .atom-platform-topbar {
      gap: 8px;
      padding: 8px 12px;
    }
    .atom-platform-brand small,
    .atom-platform-chip:not(.region),
    .atom-platform-profile span:last-child {
      display: none;
    }
    .atom-platform-chip.region {
      max-width: 210px;
      overflow: hidden;
    }
  }
  @media (max-width: 560px) {
    .atom-platform-chip.region { display: none; }
  }
</style>
<nav class="atom-platform-topbar" aria-label="Верхняя панель АТОМ">
  <a class="atom-platform-brand" href="/api/v1/admin/cabinet/view" title="Перейти на главный Dashboard АТОМ">
    <span class="atom-platform-logo">A</span>
    <span>
      <strong>АТОМ</strong>
      <small>строительная платформа</small>
    </span>
  </a>
  <span class="atom-platform-chip" title="Контекст задается Module 8 / Cabinet Context">
    Кабинет:
    <strong>{{ atom_topbar_cabinet|default("Административное пространство") }}</strong>
  </span>
  <span class="atom-platform-chip region" title="activeRegionCode = {{ atom_topbar_region_code|default("KRASNODAR_KRAI") }}">
    Регион:
    <strong>{{ atom_topbar_region_name|default("Краснодарский край") }}</strong>
  </span>
  <span class="atom-platform-chip">
    <strong>{{ atom_topbar_current_block|default("Главная") }}</strong>
  </span>
  <span class="atom-platform-spacer" aria-hidden="true"></span>
  <a class="atom-platform-icon" href="/api/v1/admin/cabinet/view" title="Главный Dashboard" aria-label="Главный Dashboard">⌂</a>
  <button class="atom-platform-icon" type="button" title="Уведомления" aria-label="Уведомления">🔔</button>
  <a class="atom-platform-icon" href="/api/v1/admin/cabinet/view#dashboard-config" title="Настроить Dashboard" aria-label="Настроить Dashboard">⚙</a>
  <a class="atom-platform-profile" href="/api/v1/admin/cabinet/view/modules/3" title="Профиль и доступы">
    <span class="atom-platform-avatar">A</span>
    <span>{{ atom_topbar_profile_name|default("Администратор") }}</span>
  </a>
</nav>
