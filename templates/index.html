<!doctype html>
<html>
  <head><meta charset="utf-8"><title>HousePlatform - Demo</title></head>
  <body>
    <h1>HousePlatform — Demo</h1>
    <h2>Создать поставщика</h2>
    <form action="/create_supplier" method="post">
      <label>Название: <input name="name" required></label><br>
      <label>Email: <input name="email"></label><br>
      <label>Город: <input name="city"></label><br>
      <button type="submit">Создать</button>
    </form>

    <h2>Существующие поставщики</h2>
    <ul>
      {% for s in suppliers %}
        <li><a href="/supplier/{{ s.id }}">{{ s.name }}</a> — {{ s.city }}</li>
      {% else %}
        <li>Нет поставщиков</li>
      {% endfor %}
    </ul>
    <p><a href="/admin">Админ-панель</a></p>
  </body>
</html>
